<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basho | Trip planning made easy</title>
    <meta name="description" content="A cinematic travel itinerary builder." />
    <meta name="author" content="Basho" />
    <link rel="icon" type="image/png" href="https://images.prismic.io/derajportfolio/adV7P-zlhpBNhbdU_basho.png?auto=format,compress" />

    <meta property="og:title" content="Basho" />
    <meta property="og:description" content="Trip planning made easy." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://images.prismic.io/derajportfolio/adV7P-zlhpBNhbdU_basho.png?auto=format,compress" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Basho" />
    <meta name="twitter:image" content="https://images.prismic.io/derajportfolio/adV7P-zlhpBNhbdU_basho.png?auto=format,compress" />
  </head>

  <body>
    <!-- Error Catcher -->
    <script>
      (function () {
        var isLocalhost =
          window.location.hostname === 'localhost' ||
          window.location.hostname === '127.0.0.1';

        window.addEventListener('error', function (e) {
          if (isLocalhost) {
            document.body.innerHTML =
              '<div style="color:red;font-size:20px;padding:20px;"><b>Global Error:</b> ' +
              e.message +
              '<br/><pre>' +
              (e.error && e.error.stack ? e.error.stack : '') +
              '</pre></div>';
            return;
          }

          console.error('Global Error:', e.message, e.error);
        });

        window.addEventListener('unhandledrejection', function (e) {
          if (isLocalhost) {
            document.body.innerHTML =
              '<div style="color:red;font-size:20px;padding:20px;"><b>Unhandled Promise:</b> ' +
              e.reason +
              '</div>';
            return;
          }

          console.error('Unhandled Promise:', e.reason);
        });
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
